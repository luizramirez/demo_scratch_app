name: Auth System CI

on:
  push:
    branches: [main, master]
    paths:
      - 'auth-system/**'
      - '.github/workflows/auth-system-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'auth-system/**'
      - '.github/workflows/auth-system-ci.yml'

jobs:
  # ── Server ──────────────────────────────────────────────────────────────
  server:
    name: Server
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 5001
      MONGODB_URI: mongodb://localhost:27017/authdb_test
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      EMAIL_HOST: smtp.ethereal.email
      EMAIL_PORT: 587
      EMAIL_USER: test@ethereal.email
      EMAIL_PASS: testpass
      EMAIL_FROM: Auth App <no-reply@example.com>

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auth-system/server/package-lock.json

      - name: Install dependencies
        working-directory: auth-system/server
        run: npm ci

      - name: Check syntax
        id: syntax
        working-directory: auth-system/server
        shell: bash
        run: set -o pipefail; node --check server.js 2>&1 | tee /tmp/server-syntax.log
        continue-on-error: true

      - name: Run tests
        id: tests
        working-directory: auth-system/server
        shell: bash
        run: set -o pipefail; npm test --if-present 2>&1 | tee /tmp/server-tests.log
        continue-on-error: true

      - name: Upload error logs
        if: steps.syntax.outcome == 'failure' || steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: server-error-logs
          path: /tmp/server-*.log
          retention-days: 1

      - name: Fail if any step failed
        if: steps.syntax.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: exit 1

  # ── Client ──────────────────────────────────────────────────────────────
  client:
    name: Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auth-system/client/package-lock.json

      - name: Install dependencies
        working-directory: auth-system/client
        run: npm ci

      - name: Build
        id: build
        working-directory: auth-system/client
        shell: bash
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:5001
        run: set -o pipefail; npm run build 2>&1 | tee /tmp/client-build.log
        continue-on-error: true

      - name: Run tests
        id: tests
        working-directory: auth-system/client
        shell: bash
        run: set -o pipefail; npm test --if-present -- --watchAll=false --passWithNoTests 2>&1 | tee /tmp/client-tests.log
        continue-on-error: true

      - name: Upload error logs
        if: steps.build.outcome == 'failure' || steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: client-error-logs
          path: /tmp/client-*.log
          retention-days: 1

      - name: Fail if any step failed
        if: steps.build.outcome == 'failure' || steps.tests.outcome == 'failure'
        run: exit 1

  # ── Claude Error Analysis ────────────────────────────────────────────────
  claude-analysis:
    name: Claude Error Analysis
    runs-on: ubuntu-latest
    needs: [server, client]
    # Runs on both push and pull_request when a job fails
    if: always() && (needs.server.result == 'failure' || needs.client.result == 'failure')
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Download server logs
        if: needs.server.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: server-error-logs
          path: /tmp/logs

      - name: Download client logs
        if: needs.client.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: client-error-logs
          path: /tmp/logs

      - name: Prepare error context
        run: |
          mkdir -p /tmp/logs
          echo "## CI Failure Summary" > /tmp/logs/context.md
          echo "- Server job: ${{ needs.server.result }}" >> /tmp/logs/context.md
          echo "- Client job: ${{ needs.client.result }}" >> /tmp/logs/context.md
          echo "" >> /tmp/logs/context.md
          for f in /tmp/logs/*.log; do
            [ -f "$f" ] || continue
            echo "### $(basename $f)" >> /tmp/logs/context.md
            cat "$f" >> /tmp/logs/context.md
            echo "" >> /tmp/logs/context.md
          done

      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "$(npm bin -g)" >> $GITHUB_PATH

      - name: Run Claude analysis
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_DISABLE_TELEMETRY: 1
          CLAUDE_PROMPT: >
            A CI pipeline for an auth system failed.
            Read the error logs at /tmp/logs/ and provide:
            1. Which job failed (server or client) and which step.
            2. The exact error message.
            3. The most likely root cause.
            4. A concrete fix (include file and line if relevant).
            Be direct. No filler.
        run: |
          echo "Claude version: $(claude --version)"
          EXIT_CODE=0
          ANALYSIS=$(claude \
            --dangerously-skip-permissions \
            --bare \
            --max-turns 5 \
            --allowedTools Read \
            --model claude-haiku-4-5-20251001 \
            -p "$CLAUDE_PROMPT" 2>&1) || EXIT_CODE=$?
          if [ -z "$ANALYSIS" ]; then
            ANALYSIS="Claude CLI failed with no output (exit code: $EXIT_CODE)."
          fi
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## 🔍 Claude CI Analysis\n\n${{ steps.claude.outputs.analysis }}`
            })
