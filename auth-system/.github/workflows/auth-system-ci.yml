name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Server ──────────────────────────────────────────────────────────────
  server:
    name: Server
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 5001
      MONGODB_URI: mongodb://localhost:27017/authdb_test
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
      EMAIL_HOST: smtp.ethereal.email
      EMAIL_PORT: 587
      EMAIL_USER: test@ethereal.email
      EMAIL_PASS: testpass
      EMAIL_FROM: Auth App <no-reply@example.com>

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Check syntax
        working-directory: server
        run: node --check server.js

      - name: Run tests
        working-directory: server
        run: npm test --if-present

  # ── Client ──────────────────────────────────────────────────────────────
  client:
    name: Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          CI: false        # treat warnings as warnings, not errors
          REACT_APP_API_URL: http://localhost:5001
        run: npm run build

      - name: Run tests
        working-directory: client
        run: npm test --if-present -- --watchAll=false --passWithNoTests
